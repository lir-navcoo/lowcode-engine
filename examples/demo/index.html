<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hello Sapu — SapuLowcodeEngine demo</title>
  <style>
    /* The demo's chrome (header / statusbar / shell) uses raw CSS
       so we can target it cleanly with the [data-theme="dark"]
       overrides in styles.css. Layout-level styles that don't
       need theme flipping stay here as plain CSS to keep the
       markup readable. */
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .demo-shell { display: flex; flex-direction: column; height: 100vh; }
    .demo-header {
      padding: 8px 16px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .demo-header h1 { font-size: 14px; margin: 0; }
    .demo-header .tag { font-size: 11px; color: #64748b; }
    .demo-header button {
      padding: 4px 10px; border: 1px solid #cbd5e1; background: white;
      border-radius: 4px; font-size: 11px; cursor: pointer; margin-left: 4px;
    }
    .demo-header button:hover { background: #f1f5f9; }
    .demo-skeleton { flex: 1; min-height: 0; }
    /* Statusbar (Phase C.Y demo polish). 24px tall, fixed font,
       low visual weight. The status bar's color and border flip
       in dark mode via the [data-theme="dark"] rules in styles.css. */
    .demo-statusbar {
      height: 24px;
      padding: 0 12px;
      background: #f8fafc;
      border-top: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: #475569;
      flex-shrink: 0;
    }
    .demo-statusbar .sb-key { color: #94a3b8; }
    .demo-statusbar .sb-value { color: #0f172a; font-weight: 500; }
    .demo-statusbar .sb-sep { width: 1px; height: 12px; background: #e2e8f0; }
  </style>
</head>
<body>
  <div class="demo-shell">
    <div class="demo-header">
      <h1>Hello Sapu</h1>
      <span class="tag">SapuLowcodeEngine · L0–L7 · @monbolc</span>
      <div style="flex:1"></div>
      <button id="add-footer">Add Footer</button>
      <button id="rename-page" title="Renames the Body node's display label in the outline tree (does not change component type)">Body → App</button>
      <button id="reset">Reset</button>
      <button id="undo" title="Undo the last edit on the command stack (L2 CommandManager). Shortcut: Ctrl/Cmd+Z.">Undo</button>
      <button id="redo" title="Redo the last undone edit (L2 CommandManager). Shortcut: Ctrl/Cmd+Shift+Z (or Ctrl+Y).">Redo</button>
      <button id="toggle-custom" title="Register a custom HexColor setter and route Sidebar.bg through it. Toggle off to revert to the inferred Input setter.">Use custom setter: off</button>
      <button id="open-second" title="L5 proof: toggle a second <Skeleton> in a sibling div, sharing the L2 component registry but owning its own Project + Workspace. Selections in one do not affect the other. Close it to dispose the L5 workspace and unmount the second Skeleton.">Open second doc</button>
      <button id="inject-crash" style="color:#b91c1c;border-color:#fda4af;background:#fff1f2;" title="L6 proof: register a plugin whose init() throws. The engine catches the throw, fires pluginError, and keeps the editor running.">Inject crash</button>
    </div>
    <div id="skeleton-row" style="display:flex; flex:1; min-height:0;">
      <div id="skeleton" class="demo-skeleton" style="flex:1; min-width:0;"></div>
    </div>
    <div id="statusbar" class="demo-statusbar"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
