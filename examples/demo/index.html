<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hello Sapu — SapuLowcodeEngine demo</title>
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .demo-shell { display: flex; flex-direction: column; height: 100vh; }
    .demo-header {
      padding: 8px 16px;
      background: white;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .demo-header h1 { font-size: 14px; margin: 0; }
    .demo-header .tag { font-size: 11px; color: #64748b; }
    .demo-header button {
      padding: 4px 10px; border: 1px solid #cbd5e1; background: white;
      border-radius: 4px; font-size: 11px; cursor: pointer; margin-left: 4px;
    }
    .demo-header button:hover { background: #f1f5f9; }
    .demo-skeleton { flex: 1; min-height: 0; }
  </style>
</head>
<body>
  <div class="demo-shell">
    <div class="demo-header">
      <h1>Hello Sapu</h1>
      <span class="tag">SapuLowcodeEngine · L0–L5 · @monbolc</span>
      <div style="flex:1"></div>
      <button id="add-footer">Add Footer</button>
      <button id="rename-page" title="Renames the Body node's display label in the outline tree (does not change component type)">Body → App</button>
      <button id="reset">Reset</button>
      <button id="toggle-custom" title="Register a custom HexColor setter and route Sidebar.bg through it. Toggle off to revert to the inferred Input setter.">Use custom setter: off</button>
      <button id="open-second" title="L5 proof: toggle a second <Skeleton> in a sibling div, sharing the L2 component registry but owning its own Project + Workspace. Selections in one do not affect the other. Close it to dispose the L5 workspace and unmount the second Skeleton.">Open second doc</button>
    </div>
    <div style="display:flex; flex:1; min-height:0;">
      <div id="skeleton"   class="demo-skeleton" style="flex:1; min-width:0;"></div>
      <div id="skeleton-2" class="demo-skeleton" style="flex:1; min-width:0; border-left:1px solid #e2e8f0;"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
