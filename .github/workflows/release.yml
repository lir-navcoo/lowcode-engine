# SapuLowcodeEngine release workflow
#
# Triggered by pushing a semver tag (v*.*.*) — the canonical release
# signal — and via `workflow_dispatch` for manual re-runs.
#
# Auth: the NPM_TOKEN GitHub secret. Generate at
# https://www.npmjs.com/settings/<user>/tokens as type **Automation**
# (not Publish — Automation skips 2FA which lerna can't satisfy in CI).
# The token value is never written to any file in this repo; it's
# referenced via `${{ secrets.NPM_TOKEN }}` and passed to npm through
# the NODE_AUTH_TOKEN env var (the standard actions/setup-node pattern).
#
# Publish model: `lerna publish from-package --yes`. Lerna is in fixed
# mode (lerna.json has no `version` field bumps — versions come from
# each package's package.json), so `from-package` reads the versions
# already in the working tree and publishes whatever's there. The
# canonical flow is: developer bumps the 14 package.json versions
# locally + commits + tags + pushes the tag. CI does NOT bump
# versions — that's a human decision.
#
# Re-running on the same tag is a safe no-op: lerna sees the version
# is already on the registry and skips it.
#
# Concurrency: NO cancel-in-progress. A partially-published release
# (some packages at 2.1.5, others still at 2.1.4) is worse than a
# slow one. Releases must run to completion.
#
# The dry_run input on workflow_dispatch runs a verification step
# (npm whoami, lerna list, local vs remote version diff) but does NOT
# invoke `lerna publish`. lerna 8 has no `--dry-run` CLI flag for
# publish, so we run a manual sanity check instead — same auth, same
# registry, no side effects.
name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (verify auth, diff local vs npm versions; does NOT publish)'
        required: false
        default: 'false'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: lerna publish from-package
    runs-on: ubuntu-latest
    permissions:
      # Needed for lerna to push per-package tags back to the repo
      # (only happens on the very first publish of a version; for
      # re-runs on the same tag this is a no-op).
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Tags are needed: lerna reads per-package version tags to
          # decide which packages are "new" relative to the registry.
          fetch-depth: 0

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'yarn'
          # CRITICAL: without registry-url, setup-node does NOT write
          # ~/.npmrc with the //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}
          # mapping. lerna's publish path uses libnpmpublish → npm-registry-fetch,
          # which reads the token from npm config (i.e. .npmrc), not from
          # NODE_AUTH_TOKEN directly. Without this, every PUT goes out
          # unauthenticated; npm returns 401, libnpmpublish translates it
          # to "E404 Not found" — which looks like the package doesn't exist.
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test

      - name: Typecheck
        run: yarn typecheck

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo "===== DRY RUN — lerna publish NOT invoked ====="
            echo ""
            echo "--- npm auth (via /-/whoami, same env var lerna uses) ---"
            curl -sS -H "Authorization: Bearer $NODE_AUTH_TOKEN" https://registry.npmjs.org/-/whoami
            echo ""
            echo ""
            echo "--- local lerna packages ---"
            npx lerna list --json --no-private
            echo ""
            echo "--- local vs remote versions ---"
            npx lerna list --json --no-private | node -e '
              let chunks = [];
              process.stdin.on("data", c => chunks.push(c));
              process.stdin.on("end", async () => {
                const pkgs = JSON.parse(Buffer.concat(chunks).toString("utf8"));
                const { execSync } = require("child_process");
                for (const p of pkgs) {
                  const local = p.version;
                  let remote = "(not published)";
                  try {
                    remote = execSync(`npm view ${p.name} version`, { encoding: "utf8" }).trim();
                  } catch (e) {
                    remote = "(query failed: " + e.message.split("\n")[0] + ")";
                  }
                  const marker = local === remote ? "  same " : (local > remote ? "  NEW  " : "  ???  ");
                  console.log(`${marker}  ${p.name.padEnd(36)}  local=${local}  npm=${remote}`);
                }
              });
            '
            echo ""
            echo "--- build artifacts (lib/) ---"
            for p in packages/*/lib/index.js; do
              [ -f "$p" ] && echo "  ✓ $p" || echo "  ✗ $p MISSING"
            done
            echo ""
            echo "--- direct npm publish test (smallest pkg, --dry-run, captures what npm itself says) ---"
            cd packages/types
            npm publish --dry-run --access public 2>&1 | head -30 || true
            cd ../..
            echo ""
            echo "--- direct PUT test (no actual publish, uses registry.npmjs.org sandbox via /-/package) ---"
            echo "PUT to /-/whoami with token in different header styles:"
            for header in "Authorization: Bearer $NODE_AUTH_TOKEN" "Authorization: token $NODE_AUTH_TOKEN"; do
              echo "  using header: $header"
              status=$(curl -sS -o /tmp/_resp.json -w "%{http_code}" -H "$header" https://registry.npmjs.org/-/whoami)
              echo "  HTTP $status — body: $(cat /tmp/_resp.json)"
            done
            echo ""
            echo "--- check token type via /-/npm/v1/tokens/self ---"
            status=$(curl -sS -o /tmp/_token.json -w "%{http_code}" -H "Authorization: Bearer $NODE_AUTH_TOKEN" https://registry.npmjs.org/-/npm/v1/tokens/self)
            echo "HTTP $status"
            cat /tmp/_token.json | head -c 500
            echo ""
            echo ""
            echo "--- check publish access for an existing package ---"
            status=$(curl -sS -o /tmp/_access.json -w "%{http_code}" -H "Authorization: Bearer $NODE_AUTH_TOKEN" "https://registry.npmjs.org/-/package/@monbolc%2flowcode-types/access")
            echo "HTTP $status"
            cat /tmp/_access.json | head -c 500
            echo ""
            echo ""
            echo "--- test PUT to a non-existent test package (will unpublish after) ---"
            put_body='{"_id":"@monbolc/dryrun-test-pkg","name":"@monbolc/dryrun-test-pkg","description":"test","dist-tags":{"latest":"0.0.0"},"versions":{"0.0.0":{"name":"@monbolc/dryrun-test-pkg","version":"0.0.0","description":"test"}},"access":"public","_attachments":{}}'
            status=$(curl -sS -o /tmp/_putresp.json -w "%{http_code}" -X PUT -H "Authorization: Bearer $NODE_AUTH_TOKEN" -H "Content-Type: application/json" --data "$put_body" "https://registry.npmjs.org/@monbolc%2fdryrun-test-pkg")
            echo "HTTP $status"
            cat /tmp/_putresp.json | head -c 500
            echo ""
            if [ "$status" = "200" ] || [ "$status" = "201" ]; then
              echo "(test pkg created — cleaning up)"
              curl -sS -X DELETE -H "Authorization: Bearer $NODE_AUTH_TOKEN" "https://registry.npmjs.org/@monbolc%2fdryrun-test-pkg/-/dryrun-test-pkg-0.0.0.tgz/-/dryrun-test-pkg-0.0.0.tgz" 2>&1 | head -3 || true
            fi
            echo ""
            echo "===== DRY RUN COMPLETE — no publish ====="
          else
            npx lerna publish from-package --yes
          fi
